<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" shape-rendering="crispEdges">
  <style>
    .hop { animation: hop 0.9s steps(1) infinite; }
    .scroll { animation: scroll 2.4s linear infinite; }
    .blink { animation: blink 0.6s steps(1) infinite; }
    @keyframes hop {
      0%   { transform: translateY(0); }
      25%  { transform: translateY(-14px); }
      50%  { transform: translateY(-20px); }
      75%  { transform: translateY(-14px); }
      100% { transform: translateY(0); }
    }
    @keyframes scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-160px); }
    }
    @keyframes blink {
      0%, 60%  { opacity: 1; }
      61%, 100% { opacity: 0.35; }
    }
  </style>
  <rect width="320" height="180" fill="#33333b"/>
  <g class="scroll">
    <g fill="#3d3d47">
      <rect x="0" y="0" width="20" height="20"/>
      <rect x="40" y="0" width="20" height="20"/>
      <rect x="20" y="20" width="20" height="20"/>
      <rect x="60" y="20" width="20" height="20"/>
      <rect x="120" y="0" width="20" height="20"/>
      <rect x="160" y="0" width="20" height="20"/>
      <rect x="200" y="0" width="20" height="20"/>
      <rect x="180" y="20" width="20" height="20"/>
      <rect x="220" y="20" width="20" height="20"/>
      <rect x="280" y="0" width="20" height="20"/>
      <rect x="320" y="0" width="20" height="20"/>
      <rect x="360" y="0" width="20" height="20"/>
      <rect x="340" y="20" width="20" height="20"/>
      <rect x="400" y="0" width="20" height="20"/>
      <rect x="440" y="20" width="20" height="20"/>
    </g>
    <g fill="#565663">
      <rect x="30" y="88" width="34" height="32"/>
      <rect x="96" y="72" width="46" height="48"/>
      <rect x="180" y="96" width="30" height="24"/>
      <rect x="240" y="80" width="52" height="40"/>
      <rect x="350" y="88" width="34" height="32"/>
      <rect x="416" y="72" width="46" height="48"/>
      <rect x="500" y="96" width="30" height="24"/>
    </g>
  </g>
  <rect x="0" y="120" width="320" height="60" fill="#4a4a56"/>
  <rect x="0" y="120" width="320" height="6" fill="#5b5b69"/>
  <g class="hop">
    <rect x="148" y="96" width="12" height="24" fill="#7a7a8a"/>
    <rect x="148" y="90" width="12" height="8" fill="#8e8ea0"/>
  </g>
  <rect class="blink" x="286" y="146" width="8" height="8" fill="#9a9aab"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="#6a6a78"/>
</svg>
